<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Camera Pro Widget</title>

<style>
  body { font-family: Arial; text-align: center; }
  video { width: 100%; max-width: 320px; border-radius: 10px; }
  button { margin: 5px; padding: 10px; border: none; border-radius: 8px; cursor: pointer; }
  .gallery { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
  .photo-container { position: relative; margin: 5px; }
  .photo-container img { width: 90px; border-radius: 8px; }
  .delete-btn {
    position: absolute; top: -5px; right: -5px;
    background: red; color: white; border-radius: 50%;
    width: 20px; height: 20px; font-size: 12px;
  }
</style>
</head>

<body>

<h3>Captura de Evidencia</h3>

<video id="video" autoplay playsinline></video>
<br>

<button onclick="takePhoto()">📸 Tomar Foto</button>

<p id="counter">0 / 10 fotos</p>

<canvas id="canvas" style="display:none;"></canvas>

<div id="gallery" class="gallery"></div>

<script>
let photos = [];

// 🔧 CONFIGURACIÓN DINÁMICA
let maxPhotos = 10;
let quality = 0.6; // compresión (0.1 - 1)
let maxWidth = 800; // resize

// 📥 Leer configuración desde Jotform
if (window.JFCustomWidget) {
  JFCustomWidget.subscribe("ready", function(){
    const settings = JFCustomWidget.getWidgetSettings();
    
    if (settings.maxPhotos) maxPhotos = parseInt(settings.maxPhotos);
    if (settings.quality) quality = parseFloat(settings.quality);
    if (settings.maxWidth) maxWidth = parseInt(settings.maxWidth);

    updateCounter();
  });
}

// 🎥 Activar cámara
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
  document.getElementById("video").srcObject = stream;
})
.catch(() => {
  alert("No se pudo acceder a la cámara");
});

// 📸 Tomar foto
function takePhoto() {
  if (photos.length >= maxPhotos) {
    alert("Límite de fotos alcanzado");
    return;
  }

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  // Resize proporcional
  const scale = maxWidth / video.videoWidth;
  canvas.width = maxWidth;
  canvas.height = video.videoHeight * scale;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Compresión JPEG
  const compressed = canvas.toDataURL("image/jpeg", quality);

  photos.push(compressed);

  renderGallery();
  updateCounter();
  sendData();
}

// 🖼️ Mostrar fotos
function renderGallery() {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  photos.forEach((p, index) => {
    const container = document.createElement("div");
    container.className = "photo-container";

    const img = document.createElement("img");
    img.src = p;

    const del = document.createElement("button");
    del.innerHTML = "×";
    del.className = "delete-btn";
    del.onclick = () => removePhoto(index);

    container.appendChild(img);
    container.appendChild(del);
    gallery.appendChild(container);
  });
}

// ❌ Eliminar foto
function removePhoto(index) {
  photos.splice(index, 1);
  renderGallery();
  updateCounter();
  sendData();
}

// 🔢 Contador
function updateCounter() {
  document.getElementById("counter").innerText =
    `${photos.length} / ${maxPhotos} fotos`;
}

// 📤 Enviar a Jotform
function sendData() {
  if (window.JFCustomWidget) {
    JFCustomWidget.sendData({
      value: photos
    });
  }
}
</script>

</body>
</html>
