<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget de Evidencias</title>
    <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f4f9; }
        .controles { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn { flex: 1; padding: 12px 5px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-foto { background: #007bff; }
        .btn-archivo { background: #6c757d; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .contador { text-align: center; font-size: 12px; color: #666; margin-bottom: 10px; }
        .galeria { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        .foto-item { position: relative; aspect-ratio: 1/1; border-radius: 5px; overflow: hidden; border: 1px solid #ddd; }
        .foto-item img { width: 100%; height: 100%; object-fit: cover; }
        .btn-borrar { position: absolute; top: 2px; right: 2px; background: rgba(255,0,0,0.8); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="controles">
        <button id="btnCamara" class="btn btn-foto">📷 Tomar Foto</button>
        <button id="btnGaleria" class="btn btn-archivo">📁 Cargar Archivo</button>
    </div>

    <div class="contador" id="contadorText">0 de 10 imágenes</div>

    <input type="file" id="inputCamara" accept="image/*" capture="environment" style="display:none">
    <input type="file" id="inputGaleria" accept="image/*" style="display:none">

    <div id="galeria" class="galeria"></div>

    <script>
        let fotos = [];
        const MAX = 10;

        const inputCamara = document.getElementById('inputCamara');
        const inputGaleria = document.getElementById('inputGaleria');
        const galeriaDiv = document.getElementById('galeria');

        // Disparadores de botones
        document.getElementById('btnCamara').onclick = () => inputCamara.click();
        document.getElementById('btnGaleria').onclick = () => inputGaleria.click();

        // Procesar archivos de ambos inputs
        [inputCamara, inputGaleria].forEach(input => {
            input.onchange = async (e) => {
                const archivos = Array.from(e.target.files);
                for (let arc of archivos) {
                    if (fotos.length < MAX) {
                        const base64 = await comprimir(arc);
                        fotos.push(base64);
                    }
                }
                input.value = ""; // Reset
                dibujar();
            };
        });

        async function comprimir(file) {
            return new Promise(res => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const ratio = Math.min(1000 / img.width, 1000 / img.height, 1);
                        canvas.width = img.width * ratio;
                        canvas.height = img.height * ratio;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        res(canvas.toDataURL('image/jpeg', 0.7));
                    }
                }
            });
        }

        function dibujar() {
            galeriaDiv.innerHTML = "";
            fotos.forEach((f, i) => {
                galeriaDiv.innerHTML += `
                    <div class="foto-item">
                        <img src="${f}">
                        <button class="btn-borrar" onclick="borrar(${i})">×</button>
                    </div>`;
            });
            document.getElementById('contadorText').innerText = `${fotos.length} de ${MAX} imágenes`;
            document.getElementById('btnCamara').disabled = document.getElementById('btnGaleria').disabled = (fotos.length >= MAX);
            
            // Ajustar altura del widget en Jotform
            JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
        }

        window.borrar = (i) => { fotos.splice(i, 1); dibujar(); };

        JFCustomWidget.subscribe("ready", () => dibujar());
        JFCustomWidget.subscribe("submit", () => {
            JFCustomWidget.sendSubmit({ valid: true, value: JSON.stringify(fotos) });
        });
    </script>
</body>
</html>
